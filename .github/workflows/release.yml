name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Validate signing secrets
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in \
            MACOS_CERTIFICATE_P12 \
            MACOS_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required for signed Homebrew releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf "%s" "$MACOS_CERTIFICATE_P12" | base64 -D -o "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build notarized release package
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          scripts/package-release.sh "$version"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          zip_file="dist/Nightcap-$version.zip"
          cask_file="dist/Casks/nightcap.rb"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$zip_file" "$cask_file" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$zip_file" "$cask_file" \
              --title "Nightcap $version" \
              --generate-notes
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [[ -z "$HOMEBREW_TAP_REPOSITORY" || -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "Skipping tap update. Set HOMEBREW_TAP_REPOSITORY and HOMEBREW_TAP_TOKEN to enable it."
            exit 0
          fi

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$tap_dir"
          mkdir -p "$tap_dir/Casks"
          cp dist/Casks/nightcap.rb "$tap_dir/Casks/nightcap.rb"

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Casks/nightcap.rb; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi

          git add Casks/nightcap.rb
          git commit -m "Update Nightcap to $version"
          git push
